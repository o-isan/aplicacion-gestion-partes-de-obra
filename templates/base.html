{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de gestión de partes de obra">
    <title>{% block title %}Gestión de Partes de Obra{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-content">
            <a href="{% url 'part_list' %}" class="navbar-brand">
                <span class="brand-icon">⚙</span>
                Partes de Obra
            </a>
            <div class="navbar-links">
                <a href="{% url 'part_list' %}" class="nav-link">Listado</a>
                <a href="{% url 'part_add' %}" class="nav-link btn-nav">+ Nuevo Parte</a>
            </div>
        </div>
    </nav>

    <main class="container main-content">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 — Sistema de Gestión de Partes de Obra</p>
        </div>
    </footer>
</body>
</html>
